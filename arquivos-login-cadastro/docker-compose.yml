services:
  db:
    image: postgis/postgis:16-3.4
    container_name: sigeo_postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: sigeo_ps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sigeo_postgis_data:/var/lib/postgresql/data

volumes:
  sigeo_postgis_data:
